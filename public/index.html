<script>
var Q=function(s){return document.querySelector(s)};
var S={pdf:null,pgs:[],pB:[],pT:[],glo:{},sCN:false,sc:1.5,busy:false,fn:"",cfg:{batchSize:10,sourceLang:"English",targetLang:"Traditional Chinese (繁體中文)",systemPrompt:""}};

/* ===== Translation Log ===== */
var tLog=[];
function logEv(type,data){
  var entry={ts:new Date().toISOString(),type:type,data:data};
  tLog.push(entry);
  console.log("[TLog]["+type+"]",typeof data==="string"?data.slice(0,200):data);
}
function dlLog(){
  if(!tLog.length){alert("No log data yet.");return}
  var name=S.fn?S.fn.replace(/\.pdf$/i,""):"translation";
  var blob=new Blob([JSON.stringify(tLog,null,2)],{type:"application/json"});
  var a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download=name+"_log_"+new Date().toISOString().slice(0,19).replace(/[:-]/g,"")+".json";
  a.click();URL.revokeObjectURL(a.href);
}

/* ===== API ===== */
async function api(m,mt){
  var r=await fetch("/api/translate",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({messages:m,max_tokens:mt||4000})});
  if(!r.ok)throw new Error((await r.json()).error||"Fail");
  return(await r.json()).text;
}
async function gC(){return(await fetch("/api/config")).json()}
async function sC(c){await fetch("/api/config",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(c)})}

/* ===== Strip tags helper ===== */
function stripTags(s){
  return s.replace(/^\s*\(TITLE\)\s*/i,"").replace(/^\s*\(BODY\)\s*/i,"").replace(/^\s*\(BULLET\)\s*/i,"").replace(/^\s*\(TABLE[^)]*\)\s*/i,"").trim();
}

/* ===== Clean translation: strip model preamble & trailing notes ===== */
function cleanTx(s){
  if(!s)return s;
  var lines=s.split("\n");
  var start=0,end=lines.length;
  /* Skip leading preamble lines (English meta-commentary before actual translation) */
  for(var i=0;i<lines.length;i++){
    var l=lines[i].trim();
    if(!l){start=i+1;continue}
    /* Common preamble patterns from models */
    if(/^(here[''\u2019]?s |here is |below is |the following |i[''\u2019]?ve |i have |sure[,!.]|certainly|of course|okay|let me|this is |translation of|translated text|complete translation)/i.test(l)){start=i+1;continue}
    if(/^(adhering|following your|as requested|as instructed|per your)/i.test(l)){start=i+1;continue}
    if(/^---+$/.test(l)){start=i+1;continue}
    break;
  }
  /* Trim trailing notes/commentary */
  for(var i=end-1;i>start;i--){
    var l=lines[i].trim();
    if(!l){end=i;continue}
    /* Common trailing patterns */
    if(/^(note[s]?\s*(on|:|\()|---+$|===+$|\*\*note|considerations|choices|key (term|translation|point)|glossary note|translation note|i hope|let me know|feel free|if you need|please let|happy to)/i.test(l)){end=i;continue}
    /* Trailing lines that are purely English sentences (no CJK) and look like commentary */
    if(!/[\u2E80-\u9FFF\uF900-\uFAFF]/.test(l)&&/^[A-Z*\-•]/.test(l)&&l.length>30&&/[.!?:]$/.test(l)){end=i;continue}
    /* Short trailing labels like "- Formal tone used" or "* Key term: X" */
    if(!/[\u2E80-\u9FFF\uF900-\uFAFF]/.test(l)&&/^[-•*]\s/.test(l)&&l.length>5){end=i;continue}
    break;
  }
  var result=lines.slice(start,end).join("\n").trim();
  if(!result)return s.trim();
  /* Strip mixed-in English source sentences from CJK translation output */
  var tgt=S.cfg.targetLang||"";
  if(/chinese|中文|日本|japanese|korean|한국/i.test(tgt)){
    result=stripMixedEn(result);
  }
  return result||s.trim();
}

/* ===== Strip mixed-in English source sentences from CJK translations ===== */
function stripMixedEn(s){
  if(!s)return s;
  /*
   * Strategy: split text into sentence-level segments, then remove segments
   * that are purely English (no CJK chars) and long enough to be source text.
   * Short English fragments (proper nouns, abbreviations) are preserved.
   */
  /* Split on sentence-ending punctuation (both EN and CJK) while keeping delimiters */
  var parts=s.split(/(?<=[.!?。！？；\n])\s*/);
  var out=[];
  for(var i=0;i<parts.length;i++){
    var seg=parts[i].trim();
    if(!seg)continue;
    /* Count CJK characters in this segment */
    var cjk=0,total=0;
    for(var j=0;j<seg.length;j++){
      var code=seg.charCodeAt(j);
      if(code>0x2E7F&&code<0xFB00)cjk++;
      if(code>32)total++;
    }
    /* If segment has zero CJK characters and is long (>25 chars), it's likely
       untranslated English source text mixed into the translation — remove it */
    if(cjk===0&&seg.length>25&&total>15){
      /* But keep if it looks like a short parenthesized term: (Domain Network) */
      if(/^\([^)]{1,40}\)$/.test(seg)){out.push(seg);continue}
      /* Skip this English source sentence */
      continue;
    }
    /* If segment is very long and CJK ratio is extremely low (<10%), likely mixed */
    if(seg.length>60&&total>0&&cjk/total<0.1){continue}
    out.push(seg);
  }
  var result=out.join(" ").replace(/\s+/g," ").trim();
  /* If we stripped too much (>80% removed), return original — safety fallback */
  if(result.length<s.length*0.2)return s;
  return result||s;
}

/* ===== Table Detection: Heuristic Fallback ===== */
function detectTableHeuristic(b){
if(b.ls.length<2)return null;var tRows=[];
for(var li=0;li<b.ls.length;li++){var line=b.ls[li];
if(line.it.length<2)continue;
var allGaps=[];for(var gi=1;gi<line.it.length;gi++){allGaps.push(line.it[gi].x-(line.it[gi-1].x+line.it[gi-1].w))}
var sGaps=allGaps.slice().sort(function(a,b2){return a-b2});
var gapTh=line.f*1.5;
if(sGaps.length>=2){for(var gi2=0;gi2<sGaps.length-1;gi2++){
if(sGaps[gi2]<1)continue;var r=sGaps[gi2+1]/sGaps[gi2];
if(r>1.8&&sGaps[gi2+1]>line.f*0.5){gapTh=(sGaps[gi2]+sGaps[gi2+1])/2;break}}}
var cells=[],curCell="",curX=line.it[0].x,prevEnd=line.it[0].x;
for(var ci=0;ci<line.it.length;ci++){var item=line.it[ci],gap=item.x-prevEnd;
if(ci>0&&gap>gapTh&&curCell.trim()){cells.push({text:curCell.trim(),x:curX});curCell=item.s;curX=item.x}
else{if(ci>0&&gap>item.f*0.25)curCell+=" ";curCell+=item.s}prevEnd=item.x+item.w}
if(curCell.trim())cells.push({text:curCell.trim(),x:curX});
if(cells.length>=2)tRows.push({cells:cells,lineIdx:li})}
if(tRows.length>=2&&tRows.length>=b.ls.length*0.5){
var maxR=tRows.reduce(function(a,b2){return b2.cells.length>a.cells.length?b2:a});
logEv("table_heuristic",{numCols:maxR.cells.length,texts:maxR.cells.map(function(c){return c.text.slice(0,25)})});
return{colXs:maxR.cells.map(function(c){return c.x}),numCols:maxR.cells.length}}
return null}

/* ===== Table Detection: AI-Assisted with Pre-computed Clustering ===== */
async function detectTableAI(b,ctxLines){
if(b.ls.length<2){console.log("[TableAI] skip: <2 lines");return null}
var multiLines=0;for(var i=0;i<b.ls.length;i++){if(b.ls[i].it.length>=2)multiLines++}
if(multiLines<2||multiLines<b.ls.length*0.5){console.log("[TableAI] skip: multiLines="+multiLines+"/"+b.ls.length);return null}
/* Combine block lines + context lines from adjacent blocks */
var allLines=b.ls.slice();
if(ctxLines){for(var ci8=0;ci8<ctxLines.length;ci8++){if(ctxLines[ci8].it&&ctxLines[ci8].it.length>=2)allLines.push(ctxLines[ci8])}}
console.log("[TableAI] Analyzing block: "+b.ls.length+" lines + "+(allLines.length-b.ls.length)+" context lines");
/* Collect all x-positions from all lines */
var allXs=[];for(var li2=0;li2<allLines.length;li2++){for(var ii2=0;ii2<allLines[li2].it.length;ii2++){allXs.push(Math.round(allLines[li2].it[ii2].x))}}
allXs.sort(function(a,b2){return a-b2});if(allXs.length<4)return null;
/* Compute average font size for clustering tolerance */
var avgFs=0;for(var ai=0;ai<allLines.length;ai++)avgFs+=allLines[ai].f;avgFs=avgFs/allLines.length||11;
var tol=Math.max(8,avgFs*0.8);
/* ===== STAGE 1: Gap Distribution Analysis (handles wide-column tables) ===== */
var proposedColXs=null;
var allGaps=[];
for(var li3=0;li3<b.ls.length;li3++){var line3=b.ls[li3];if(line3.it.length<2)continue;
var sorted3=line3.it.slice().sort(function(a,b2){return a.x-b2.x});
for(var si=0;si<sorted3.length-1;si++){var gv=sorted3[si+1].x-(sorted3[si].x+sorted3[si].w);
allGaps.push({gap:gv,pos:(sorted3[si].x+sorted3[si].w+sorted3[si+1].x)/2})}}
if(allGaps.length>=2){
var splitPt=avgFs*0.5;
var sG=allGaps.filter(function(g){return g.gap<splitPt});
var lG=allGaps.filter(function(g){return g.gap>=splitPt});
if(sG.length>0&&lG.length>0){
var maxS=-Infinity,minL=Infinity;
for(var gi=0;gi<sG.length;gi++){if(sG[gi].gap>maxS)maxS=sG[gi].gap}
for(var gi=0;gi<lG.length;gi++){if(lG[gi].gap<minL)minL=lG[gi].gap}
if(minL>maxS*1.5){
var mTh=(maxS+minL)/2;
console.log("[TableAI] Bimodal gaps: small≤"+Math.round(maxS)+", large≥"+Math.round(minL)+", threshold="+Math.round(mTh));
/* Extract column boundary positions from large gaps */
var bdrys=lG.map(function(g){return Math.round(g.pos)}).sort(function(a,b2){return a-b2});
/* Cluster boundary positions (dedup within tolerance) */
var uniqB=[bdrys[0]];for(var bi=1;bi<bdrys.length;bi++){if(bdrys[bi]-uniqB[uniqB.length-1]>avgFs*2)uniqB.push(bdrys[bi])}
/* Derive colXs: for each region between boundaries, find min item x */
var regions=[{mn:0,mx:uniqB[0]}];
for(var ri=0;ri<uniqB.length-1;ri++)regions.push({mn:uniqB[ri],mx:uniqB[ri+1]});
regions.push({mn:uniqB[uniqB.length-1],mx:Infinity});
var gapColXs=[];
for(var ri=0;ri<regions.length;ri++){var minX=Infinity;
for(var li4=0;li4<allLines.length;li4++){for(var ii4=0;ii4<allLines[li4].it.length;ii4++){
var ix=allLines[li4].it[ii4].x;if(ix>regions[ri].mn-avgFs&&ix<regions[ri].mx+avgFs)minX=Math.min(minX,ix)}}
if(minX<Infinity)gapColXs.push(Math.round(minX))}
if(gapColXs.length>=2){proposedColXs=gapColXs;
console.log("[TableAI] Gap-based: "+proposedColXs.length+" columns at",proposedColXs)}}}}
/* ===== STAGE 2: X-Clustering Fallback (handles uniform-gap tables like 7-col) ===== */
if(!proposedColXs){
var clusters=[[allXs[0]]];for(var xi=1;xi<allXs.length;xi++){
var lc=clusters[clusters.length-1];if(allXs[xi]-lc[0]<=tol){lc.push(allXs[xi])}else{clusters.push([allXs[xi]])}}
proposedColXs=clusters.map(function(c){var s=0;for(var i=0;i<c.length;i++)s+=c[i];return Math.round(s/c.length)});
console.log("[TableAI] X-clustering: "+proposedColXs.length+" columns at",proposedColXs,"(tol="+Math.round(tol)+")")}
if(proposedColXs.length<2)return null;
/* Confidence: count block lines with items matching >= 2 distinct clusters */
function clusterConf(lines,cols,t){var cnt=0;for(var i=0;i<lines.length;i++){var ln=lines[i],mc=0;
for(var cc=0;cc<cols.length;cc++){for(var ii=0;ii<ln.it.length;ii++){if(Math.abs(ln.it[ii].x-cols[cc])<=t){mc++;break}}}
if(mc>=2)cnt++}return cnt}
var conf=clusterConf(b.ls,proposedColXs,tol);
/* Build text description for AI */
var desc="";var maxLn=Math.min(allLines.length,25);
for(var li=0;li<maxLn;li++){var line=allLines[li];
desc+="LINE "+li+" (y="+Math.round(line.y)+", fs="+Math.round(line.f)+"):\n";
for(var ii=0;ii<line.it.length;ii++){var it=line.it[ii];
desc+='  [x='+Math.round(it.x)+' w='+Math.round(it.w)+'] "'+it.s+'"\n'}}
/* AI prompt: ask AI to VALIDATE pre-computed clusters (not discover from scratch) */
var prompt="You are a table structure analyzer for PDF text items.\n\n"+desc+"\n"+
"PROPOSED COLUMNS (algorithmically computed from gap distribution analysis):\n"+
proposedColXs.length+" columns at x-positions: ["+proposedColXs.join(", ")+"]\n\n"+
"TASK: Determine if these items form a table.\n"+
"- Items at similar x-positions across different lines = same column\n"+
"- The proposed column positions above were computed by grouping similar x-coordinates\n"+
"- Accept the proposed positions if they look correct, or adjust if needed\n"+
"- If this is NOT a table (just regular paragraph text), return columns:0\n\n"+
"Return ONLY valid JSON:\n"+
'{"columns":N,"colXs":[x1,x2,...]} or {"columns":0}\n';
logEv("table_ai_input",{lines:allLines.length,blockLines:b.ls.length,items:allXs.length,proposedCols:proposedColXs,confidence:conf+"/"+b.ls.length,preview:desc.slice(0,500)});
try{
console.log("[TableAI] sending API request...");
var raw=await api([{role:"user",content:prompt}],500);
console.log("[TableAI] AI response:",raw);logEv("table_ai_raw",raw);
var parsed;try{parsed=JSON.parse(raw.replace(/```json|```/g,"").trim())}catch(e){
var cM=raw.match(/colXs[:\s]*\[([^\]]+)\]/);var nM=raw.match(/columns[:\s]*(\d+)/);
if(cM&&nM)parsed={columns:parseInt(nM[1]),colXs:cM[1].split(",").map(Number)}}
if(parsed&&parsed.columns>=2&&parsed.colXs&&parsed.colXs.length>=2){
var valid=true;for(var vi=1;vi<parsed.colXs.length;vi++){if(parsed.colXs[vi]<=parsed.colXs[vi-1]){valid=false;break}}
if(valid){logEv("table_ai_result",{numCols:parsed.colXs.length,colXs:parsed.colXs});
console.log("[TableAI] AI confirmed: "+parsed.colXs.length+" columns at",parsed.colXs);
return{colXs:parsed.colXs,numCols:parsed.colXs.length}}}
/* AI said not-a-table explicitly */
if(parsed&&parsed.columns===0){console.log("[TableAI] AI says not a table");logEv("table_ai_not_table",{});return null}
/* AI gave invalid/unexpected response: use pre-computed clusters if confident */
if(conf>=b.ls.length*0.5){console.log("[TableAI] AI invalid, using pre-computed clusters (conf="+conf+"/"+b.ls.length+")");
logEv("table_ai_fallback_clusters",{cols:proposedColXs,conf:conf});return{colXs:proposedColXs,numCols:proposedColXs.length}}
logEv("table_ai_invalid",{raw:raw,parsed:parsed});return null;
}catch(e){console.error("[TableAI] ERROR:",e.message);logEv("table_ai_error",e.message);
/* API error: use pre-computed clusters if confident enough */
if(conf>=b.ls.length*0.5){console.log("[TableAI] API error, using clusters (conf="+conf+"/"+b.ls.length+")");
return{colXs:proposedColXs,numCols:proposedColXs.length}}return null}}

/* ===== Table Detection: Coordinator (AI first, heuristic fallback) ===== */
async function detectTable(b,ctxLines){
var aiResult=await detectTableAI(b,ctxLines);
if(aiResult)return aiResult;
return detectTableHeuristic(b)}

/* ===== Text Block Extraction ===== */
async function xB(items,pH){if(!items||!items.length)return[];var p=[];for(var k=0;k<items.length;k++){var it=items[k];if(!it.str.trim())continue;var tx=it.transform;var ef=Math.abs(tx[3])||Math.abs(tx[0])||12;p.push({s:it.str,x:tx[4],y:tx[5],f:ef,w:it.width||(it.str.length*ef*0.55)})}p.sort(function(a,b){return b.y-a.y||a.x-b.x});
var ls=[],ln=null;for(var k=0;k<p.length;k++){var i=p[k];if(!ln||Math.abs(i.y-ln.y)>i.f*0.6){if(ln)ls.push(ln);ln={it:[i],y:i.y,x:i.x,ex:i.x+i.w,f:i.f}}else{ln.it.push(i);ln.ex=Math.max(ln.ex,i.x+i.w);ln.x=Math.min(ln.x,i.x);ln.f=Math.max(ln.f,i.f)}}if(ln)ls.push(ln);
for(var q=0;q<ls.length;q++){var l=ls[q],t="",pe=l.it[0].x;for(var j=0;j<l.it.length;j++){var ii=l.it[j];if(ii.x-pe>ii.f*0.25&&t.length)t+=" ";t+=ii.s;pe=ii.x+ii.w}l.t=t;l.w2=l.ex-l.x}
var bs=[],cu=null,cB=false;for(var q=0;q<ls.length;q++){var l=ls[q];if(!l.t.trim()){if(cu){bs.push(cu);cu=null;cB=false}continue}var iB=/^[\s]*[^\w\s]\s/.test(l.t)||/^\s*\d+[.\)]\s/.test(l.t);
if(!cu){cu={ls:[l]};cB=iB}else{var pv=cu.ls[cu.ls.length-1],gap=pv.y-l.y,bf=pv.f,con=gap>=0&&gap<bf*1.8,fr=l.f/cu.ls[0].f,fc=fr<0.7||fr>1.3,ic=cB&&!iB&&Math.abs(l.x-pv.x)<bf*3&&con,mi=!cB&&Math.abs(l.x-cu.ls[0].x)>bf*8;
/* Center-alignment check: don't split centered text (e.g., figure captions) */
if(mi&&con){var cx1=cu.ls[0].x+cu.ls[0].w2/2,cx2=l.x+l.w2/2;if(Math.abs(cx1-cx2)<bf*3)mi=false}
if(fc||iB||(!ic&&(!con||mi))){bs.push(cu);cu={ls:[l]};cB=iB}else cu.ls.push(l)}}if(cu)bs.push(cu);
/* Table detection: AI-assisted with heuristic fallback */
for(var q=0;q<bs.length;q++){var b=bs[q];
/* Collect context lines from adjacent blocks for AI analysis */
var ctxLines=[];
if(q>0)for(var ci9=0;ci9<bs[q-1].ls.length;ci9++)ctxLines.push(bs[q-1].ls[ci9]);
if(q<bs.length-1)for(var ci9=0;ci9<bs[q+1].ls.length;ci9++)ctxLines.push(bs[q+1].ls[ci9]);
var det=await detectTable(b,ctxLines);
if(det){b.isTable=true;b.colXs=det.colXs;b.numCols=det.numCols;
logEv("table_detected",{blockIdx:q,lines:b.ls.length,numCols:b.numCols,colXs:b.colXs.map(function(x){return Math.round(x*10)/10})});
/* Rebuild rows using colXs for ALL lines */
b.rows=[];for(var li2=0;li2<b.ls.length;li2++){var line2=b.ls[li2];var rowCells=[];for(var rc=0;rc<b.colXs.length;rc++)rowCells.push("");
for(var ii3=0;ii3<line2.it.length;ii3++){var itm3=line2.it[ii3],itmC=itm3.x+itm3.w/2;var bestCol=0;
for(var bc=b.colXs.length-1;bc>=0;bc--){if(itmC>=b.colXs[bc]-itm3.f){bestCol=bc;break}}
if(rowCells[bestCol])rowCells[bestCol]+=" ";rowCells[bestCol]+=itm3.s}
b.rows.push(rowCells.map(function(c2){return c2.trim()}))}}}
/* Merge physical table rows into logical rows, tracking line ranges */
for(var q2=0;q2<bs.length;q2++){var b2=bs[q2];if(!b2.isTable||b2.rows.length<=1)continue;
var mR=[],cR2=null,slIdx=0;
/* Detect header: first physical row where all non-empty cells are short, lack terminal punctuation, and have varying content */
var startR=0,fR=b2.rows[0],fNe=fR.filter(function(c){return c.trim().length>0});
var isHdr2=fNe.length>=2&&fNe.every(function(c){return c.trim().length<=40&&!/[.!?。！？]$/.test(c.trim())});
if(isHdr2){/* Reject if all cells have identical text (e.g. "Assessment based on" x3 — that's content, not a header) */
  var uniq=[];for(var ui=0;ui<fNe.length;ui++){if(uniq.indexOf(fNe[ui].trim())<0)uniq.push(fNe[ui].trim())}
  if(uniq.length>1){mR.push({cells:fR,fl:0,tl:0,isHdr:true});startR=1}}
for(var ri2=startR;ri2<b2.rows.length;ri2++){var pr=b2.rows[ri2];

/* ===== Default System Prompt Builder ===== */
function buildSystemPrompt(ctx,glossary){
  var src=S.cfg.sourceLang||"English";
  var tgt=S.cfg.targetLang||"Traditional Chinese (繁體中文)";
  var custom=S.cfg.systemPrompt||"";

  var base='You are a professional '+src+' to '+tgt+' translator.\n'+
    'Domain: "'+(ctx.domain||"general")+'".\n'+
    (ctx.key_terms&&ctx.key_terms.length?'Key terms: '+ctx.key_terms.join(", ")+'.\n':'')+
    '\nSTRICT RULES:\n'+
    '1. Translate each numbered block [N] to natural '+tgt+'.\n'+
    '2. Keep the [N] prefix exactly as given.\n'+
    '3. Do NOT include (TITLE), (BODY), (BULLET), (TABLE) tags in your output.\n'+
    '4. For proper nouns, keep '+src+' in parentheses on first mention.\n'+
    '5. Translate EVERY block. Do not skip any.\n'+
    '6. Translate the COMPLETE text of each block sentence by sentence. Do NOT summarize, shorten, or omit ANY sentences. Every sentence in the source must appear in the translation.\n'+
    '7. For very short text blocks (under 5 words), translate concisely without adding parenthetical English.\n'+
    '7a. For (TABLE) blocks: translate as concisely as possible. These are table cells with limited space. Use the shortest natural '+tgt+' phrasing. Do NOT add parenthetical English for proper nouns in table cells.\n'+
    '8. After all translations, add a line "GLOSSARY:" followed by "'+src+' -> '+tgt+'" term pairs.\n'+
    '9. Output ONLY the [N] translations and GLOSSARY. No preamble, no notes, no explanations, no commentary. Do NOT write "Here is the translation" or "Notes on Choices". Start directly with [0].\n'+
    '10. Do NOT include the original '+src+' text in your translation. Output ONLY '+tgt+'. Never mix source and target languages sentence by sentence.\n'+
    '\nExample output format:\n'+
    '[0] first translated block\n\n'+
    '[1] second translated block\n\n'+
    'GLOSSARY:\nTerm -> translation';

  /* Append accumulated glossary for consistency */
  if(glossary&&Object.keys(glossary).length){
    var gKeys=Object.keys(glossary).slice(0,50);
    var gls=gKeys.map(function(k){return k+' -> '+glossary[k]});
    base+='\n\nESTABLISHED GLOSSARY (use these translations consistently):\n'+gls.join('\n');
  }

  if(custom.trim()){
    base+='\n\nADDITIONAL INSTRUCTIONS FROM USER:\n'+custom;
  }
  return base;
}

/* ===== Domain Analysis ===== */
async function aC(t){
  var prompt="You are a document analyzer. Read the text below and return ONLY a JSON object with these fields:\n"+
    "- domain: the subject area (e.g. \"cybersecurity\", \"medical\", \"finance\")\n"+
    "- organizations: key organizations mentioned\n"+
    "- key_terms: array of 15-20 important technical terms\n\n"+
    "Return ONLY valid JSON, no markdown, no explanation.\n\n"+t.slice(0,3000);
  logEv("domain_input",{textLen:t.length,preview:t.slice(0,300)});
  try{
    var r=await api([{role:"user",content:prompt}],2000);
    logEv("domain_raw_response",r);
    /* Try JSON parse first */
    try{var parsed=JSON.parse(r.replace(/```json|```/g,"").trim());logEv("domain_result",parsed);return parsed}catch(je){}
    /* Fallback: extract from free text for weaker models */
    console.warn("Domain analysis JSON parse failed, using fallback extraction");
    var domain="general",key_terms=[];
    var dm=r.match(/domain[:\s]*"?([^"\n,}]+)/i);
    if(dm)domain=dm[1].trim().replace(/["\s]+$/,"");
    var ktm=r.match(/key.?terms[:\s]*\[([^\]]+)\]/i);
    if(ktm){key_terms=ktm[1].split(",").map(function(s){return s.trim().replace(/^["'\s]+|["'\s]+$/g,"")}).filter(function(s){return s.length>1})}
    if(!key_terms.length){
      var bullets=r.match(/[-•*]\s*(.+)/g);
      if(bullets)key_terms=bullets.slice(0,20).map(function(s){return s.replace(/^[-•*]\s*/,"").trim()});
    }
    var fb={domain:domain,organizations:"",key_terms:key_terms};
    logEv("domain_result_fallback",fb);
    return fb;
  }catch(e){logEv("domain_error",e.message);return{domain:"general",organizations:"",key_terms:[]}}
}

/* ===== Translation Engine (improved) ===== */
async function tB(bl,ctx,onP,initGlossary){
  var B=S.cfg.batchSize||10;
  var res=new Array(bl.length).fill(null),gl=Object.assign({},initGlossary||{});
  var maxTk=B<=5?4000:(B<=10?6000:8000);

  for(var i=0;i<bl.length;){
    var bEnd=Math.min(i+B,bl.length);
    var ch=bl.slice(i,bEnd);
    var curMaxTk=maxTk;
    /* Rebuild system prompt each batch with accumulated glossary */
    var sy=buildSystemPrompt(ctx,gl);
    var nm=ch.map(function(b,j){
      return"["+(i+j)+"] "+(b.isT?"(TITLE) ":b.isB?"(BULLET) ":b.isTableCell?"(TABLE) ":"(BODY) ")+b.text;
    }).join("\n\n");

    logEv("batch_input",{batchStart:i,blockCount:ch.length,blocks:ch.map(function(b,j){return{idx:i+j,type:b.isT?"TITLE":b.isB?"BULLET":b.isTableCell?"CELL":"BODY",textLen:b.text.length,text:b.text.slice(0,150),pos:{top:b.top,l:b.l,w:b.w,h:b.h,fs:b.fs}}})});

    /* Try up to 2 times per batch */
    var attempts=0, success=false;
    while(attempts<2 && !success){
      attempts++;
      try{
        var raw=await api([{role:"user",content:sy+"\n\nTranslate the following:\n\n"+nm}],curMaxTk);
        logEv("batch_raw_response",{batchStart:i,attempt:attempts,responseLen:raw.length,response:raw});
        var gi=raw.indexOf("GLOSSARY:");
        var tp=gi>=0?raw.slice(0,gi):raw;
        var gp=gi>=0?raw.slice(gi+9):"";

        /* Parse translations - primary regex */
        var re=/\[(\d+)\]\s*([\s\S]*?)(?=\n\s*\[|\n\s*GLOSSARY|\s*$)/g,m;
        var batchFound=0;
        while((m=re.exec(tp))){
          var idx=parseInt(m[1]);
          if(idx<bl.length){
            var rawTx=stripTags(m[2].trim());
            res[idx]=cleanTx(rawTx);
            batchFound++;
          }
        }
        /* Fallback regex: try bracket variants (N), N., N) if primary found too few */
        if(batchFound<ch.length){
          var re2=/(?:^|\n)\s*(?:\[(\d+)\]|\((\d+)\)|(\d+)[.\)])\s*([\s\S]*?)(?=\n\s*(?:\[|\(|\d+[.\)])|\n\s*GLOSSARY|\s*$)/g;
          while((m=re2.exec(tp))){
            var idx2=parseInt(m[1]||m[2]||m[3]);
            if(idx2<bl.length&&!res[idx2]){var rawTx2=stripTags(m[4].trim());res[idx2]=cleanTx(rawTx2);batchFound++}
          }
        }
        /* Single-block batch: use entire response if nothing matched */
        if(batchFound===0&&ch.length===1){
          var cleanTp=cleanTx(tp.replace(/^\s*\[?\d*\]?\s*/,"").trim());
          if(cleanTp&&cleanTp.length>0){res[i]=stripTags(cleanTp);batchFound=1}
        }

        /* Parse glossary */
        var gs=gp.split("\n");
        for(var g=0;g<gs.length;g++){
          var pp=gs[g].split(/->|→/).map(function(s){return s.trim().replace(/^[\*\-•]\s*/,"")});
          if(pp.length===2&&pp[0]&&pp[1])gl[pp[0]]=pp[1];
        }

        /* Log parsed results for this batch */
        var parsedLog=[];for(var pi2=i;pi2<i+ch.length;pi2++){parsedLog.push({idx:pi2,translation:res[pi2]?res[pi2].slice(0,100):null,len:res[pi2]?res[pi2].length:0})}
        logEv("batch_parsed",{batchStart:i,found:batchFound,expected:ch.length,results:parsedLog});

        /* Check if we got all blocks in this batch */
        if(batchFound>=ch.length){
          success=true;
        }else if(attempts<2){
          console.warn("Batch at "+i+": got "+batchFound+"/"+ch.length+", retrying...");
        }else{
          console.warn("Batch at "+i+": got "+batchFound+"/"+ch.length+" after retry");
          success=true; /* accept partial results */
        }
      }catch(e){
        console.error("Batch error (attempt "+attempts+"):",e);
        if(attempts>=2) success=true; /* give up but continue */
      }
    }

    /* Retry blocks with null (missing) or truncated translations individually */
    for(var ci=0;ci<ch.length;ci++){
      var bIdx=i+ci,srcB=ch[ci],tr=res[bIdx];
      var needsRetry=!tr||(srcB.text.length>30&&!srcB.isT&&tr.length<srcB.text.length*0.25);
      if(needsRetry){
        logEv("retry_start",{blockIdx:bIdx,reason:tr?"truncated":"missing",srcLen:srcB.text.length,trLen:tr?tr.length:0,srcText:srcB.text.slice(0,200)});
        try{
          var tgt=S.cfg.targetLang||"Traditional Chinese (繁體中文)";
          var rSy='Translate the COMPLETE text below to '+tgt+'.\n'+
            'CRITICAL RULES:\n'+
            '- Translate EVERY sentence. Do NOT summarize or shorten.\n'+
            '- Output ONLY the translated text in '+tgt+'.\n'+
            '- Do NOT include any preamble like "Here is the translation".\n'+
            '- Do NOT include any notes, explanations, or commentary.\n'+
            '- Do NOT include section headers like "Notes on Choices".\n'+
            '- Do NOT include the original English text. Output ONLY '+tgt+', never mix English and '+tgt+' sentence by sentence.\n'+
            '- Start your response directly with the '+tgt+' translation.\n';
          if(Object.keys(gl).length){rSy+='Glossary:\n'+Object.keys(gl).slice(0,30).map(function(k){return k+' -> '+gl[k]}).join('\n')+'\n'}
          var rRaw=await api([{role:"user",content:rSy+'\nText to translate:\n'+srcB.text}],2000);
          logEv("retry_raw_response",{blockIdx:bIdx,responseLen:rRaw?rRaw.length:0,response:rRaw});
          if(rRaw){
            var cleaned=cleanTx(rRaw.replace(/^\s*\[?\d*\]?\s*/,"").trim());
            var maxLen=srcB.text.length*1.5;
            if(cleaned&&cleaned.length>maxLen){
              logEv("retry_rejected_hallucination",{blockIdx:bIdx,cleanedLen:cleaned.length,srcLen:srcB.text.length,maxAllowed:maxLen,preview:cleaned.slice(0,150)});
            }else if(cleaned&&(!tr||cleaned.length>tr.length)){
              res[bIdx]=cleaned;
              logEv("retry_success",{blockIdx:bIdx,cleanedLen:cleaned.length,preview:cleaned.slice(0,150)});
            }else{
              logEv("retry_no_improvement",{blockIdx:bIdx,cleanedLen:cleaned?cleaned.length:0,oldLen:tr?tr.length:0});
            }
          }
        }catch(re2){logEv("retry_error",{blockIdx:bIdx,error:re2.message})}
      }
    }

    if(onP)onP(Math.min(bEnd,bl.length),bl.length);
    i=bEnd;
  }
  return{translations:res,glossary:gl};
}
